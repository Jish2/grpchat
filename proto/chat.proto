syntax = "proto3";

package chat;

// Bidirectional streaming RPC: both client and server send a stream of messages.
// See https://grpc.io/docs/languages/node/basics/#bidirectional-streaming-rpc
service ChatRoom {
  rpc Join(stream ChatMessage) returns (stream ChatMessage);
}

message ChatMessage {
  string username = 1;
  string text = 2;
  // Unix epoch milliseconds; server sets this when broadcasting.
  int64 timestamp = 3;
}
